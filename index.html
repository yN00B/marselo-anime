<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AniStream - Premium Streaming Portal</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #0b0f19; }
        .custom-scrollbar::-webkit-scrollbar { width: 6px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: #111827; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #374151; border-radius: 3px; }
    </style>
</head>
<body class="text-gray-100 min-h-screen flex flex-col selection:bg-indigo-500 selection:text-white">

    <header class="border-b border-gray-800/80 bg-gray-900/60 backdrop-blur-md sticky top-0 z-50 px-4 lg:px-8 py-4 flex items-center justify-between">
        <div id="nav-logo" class="flex items-center gap-2 cursor-pointer">
            <div class="bg-indigo-600 p-2 rounded-xl text-white shadow-lg shadow-indigo-600/20">
                <i data-lucide="play" class="w-5 h-5 fill-current"></i>
            </div>
            <span class="text-xl font-bold tracking-wider bg-gradient-to-r from-indigo-400 to-purple-400 bg-clip-text text-transparent">ANISTREAM</span>
        </div>

        <nav class="hidden md:flex items-center gap-6 text-sm font-medium text-gray-400">
            <button id="nav-home" class="hover:text-white transition-colors">Home</button>
            <button class="genre-filter hover:text-white transition-colors" data-genre="Action">Action</button>
            <button class="genre-filter hover:text-white transition-colors" data-genre="Fantasy">Fantasy</button>
            <button class="genre-filter hover:text-white transition-colors" data-genre="Sci-Fi">Sci-Fi</button>
        </nav>

        <div class="relative w-full max-w-xs sm:max-w-md ml-4">
            <span class="absolute inset-y-0 left-0 flex items-center pl-3 pointer-events-none text-gray-400">
                <i data-lucide="search" class="w-4 h-4"></i>
            </span>
            <input type="text" id="search-input" placeholder="Search anime series..." class="w-full pl-9 pr-4 py-2 bg-gray-800/60 border border-gray-700/60 rounded-xl focus:outline-none focus:ring-2 focus:ring-indigo-500 text-sm transition-all text-gray-200 placeholder-gray-500">
        </div>
    </header>

    <div id="homepage-view" class="flex-1 w-full max-w-7xl mx-auto px-4 lg:px-8 py-6 space-y-10">
        <div id="hero-banner" class="relative rounded-3xl overflow-hidden bg-gradient-to-r from-gray-950 to-gray-900 border border-gray-800 min-h-[350px] flex items-center p-6 md:p-12 shadow-2xl">
            <div class="absolute inset-0 bg-cover bg-center opacity-20 pointer-events-none" id="hero-bg"></div>
            <div class="absolute inset-0 bg-gradient-to-t from-gray-950 via-transparent to-transparent"></div>
            <div class="relative z-10 max-w-2xl space-y-4">
                <span class="px-3 py-1 bg-indigo-600/20 text-indigo-400 border border-indigo-500/30 rounded-full text-xs font-semibold uppercase tracking-wider">Featured Entry</span>
                <h2 id="hero-title" class="text-3xl md:text-5xl font-extrabold tracking-tight">Loading Featured Anime...</h2>
                <p id="hero-desc" class="text-gray-400 text-sm md:text-base line-clamp-3 leading-relaxed"></p>
                <div class="pt-2">
                    <button id="hero-play-btn" class="flex items-center gap-2 bg-indigo-600 hover:bg-indigo-500 text-white font-medium px-6 py-3 rounded-xl shadow-lg shadow-indigo-600/20 transition-all transform hover:-translate-y-0.5">
                        <i data-lucide="play-circle" class="w-5 h-5"></i> Watch First Episode
                    </button>
                </div>
            </div>
        </div>

        <div class="space-y-4">
            <div class="flex items-center justify-between">
                <h3 id="main-grid-title" class="text-xl font-bold tracking-tight text-white flex items-center gap-2"><i data-lucide="trending-up" class="w-5 h-5 text-indigo-400"></i> Trending Videos Now</h3>
            </div>
            <div id="trending-grid" class="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-4 lg:grid-cols-6 gap-4">
                </div>
        </div>

        <div id="favorites-section" class="space-y-4">
            <h3 class="text-xl font-bold tracking-tight text-white flex items-center gap-2"><i data-lucide="award" class="w-5 h-5 text-purple-400"></i> High-Rated Classics</h3>
            <div id="favorites-grid" class="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-4 lg:grid-cols-6 gap-4">
                </div>
        </div>
    </div>

    <div id="watch-view" class="hidden flex-1 max-w-[1600px] w-full mx-auto p-4 lg:p-8 grid grid-cols-1 lg:grid-cols-4 gap-8">
        <div class="lg:col-span-3 space-y-6">
            <button id="back-btn" class="inline-flex items-center gap-2 text-sm text-gray-400 hover:text-indigo-400 transition-colors font-medium mb-2">
                <i data-lucide="arrow-left" class="w-4 h-4"></i> Back to Homepage
            </button>
            
            <div class="relative aspect-video w-full bg-black rounded-2xl overflow-hidden shadow-2xl border border-gray-800/60">
                <iframe id="embed-player" src="" class="w-full h-full absolute inset-0" frameborder="0" allowfullscreen allow="autoplay; encrypted-media"></iframe>
            </div>

            <div class="bg-gray-900/90 border border-gray-800 rounded-2xl p-4 flex flex-wrap items-center justify-between gap-4">
                <div class="flex gap-2">
                    <button id="ctrl-play" class="flex items-center gap-1.5 bg-indigo-600 hover:bg-indigo-500 px-4 py-2 rounded-xl text-sm font-medium transition-all shadow-md"><i data-lucide="play" class="w-4 h-4"></i> Play/Pause</button>
                    <button id="ctrl-seek" class="flex items-center gap-1.5 bg-gray-800 hover:bg-gray-700 px-3 py-2 rounded-xl text-sm transition-all text-gray-300">Skip Intro (+2m)</button>
                </div>
                <div class="flex items-center gap-4 text-xs font-mono bg-gray-950 px-4 py-2 rounded-xl border border-gray-800">
                    <div>Status: <span id="meta-status" class="text-amber-400">Awaiting Load</span></div>
                    <div class="text-gray-600">|</div>
                    <div>Time: <span id="meta-time" class="text-indigo-400">00:00</span> / <span id="meta-duration">00:00</span></div>
                </div>
            </div>

            <div id="anime-details" class="bg-gray-900/30 border border-gray-800/80 rounded-2xl p-6 space-y-4">
                <div class="flex items-start justify-between gap-4">
                    <div>
                        <h1 id="anime-title" class="text-2xl font-bold text-white">Loading Details...</h1>
                        <p id="anime-studio" class="text-sm text-indigo-400 font-medium mt-1"></p>
                    </div>
                    <div id="anime-rating" class="bg-yellow-500/10 text-yellow-500 border border-yellow-500/20 px-3 py-1 rounded-xl text-sm font-bold whitespace-nowrap"></div>
                </div>
                <p id="anime-description" class="text-gray-400 text-sm leading-relaxed max-h-24 overflow-y-auto custom-scrollbar"></p>
                <div id="anime-genres" class="flex flex-wrap gap-2 pt-1"></div>
            </div>
        </div>

        <div class="space-y-6">
            <div class="bg-gray-900/90 border border-gray-800 rounded-2xl p-4 space-y-3">
                <h3 class="font-semibold text-xs tracking-wider uppercase text-gray-400">Audio Track Channel</h3>
                <div class="grid grid-cols-2 gap-2">
                    <button id="btn-sub" class="py-2.5 rounded-xl text-sm font-semibold transition-all">SUB</button>
                    <button id="btn-dub" class="py-2.5 rounded-xl text-sm font-semibold transition-all">DUB</button>
                </div>
            </div>

            <div class="bg-gray-900/90 border border-gray-800 rounded-2xl p-4 space-y-3">
                <div class="flex justify-between items-center">
                    <h3 class="font-semibold text-xs tracking-wider uppercase text-gray-400">Available Episodes</h3>
                    <span id="episode-count" class="text-xs font-mono bg-gray-800 px-2 py-0.5 rounded-md text-gray-400">-- Ep</span>
                </div>
                <div id="episode-list" class="grid grid-cols-4 gap-2 max-h-[220px] overflow-y-auto custom-scrollbar pr-1"></div>
            </div>
        </div>
    </div>

    <footer class="border-t border-gray-800/60 bg-gray-900/20 text-center py-6 mt-auto text-xs text-gray-500 tracking-wide">
        <p>&copy; 2026 AniStream Inc. Synchronized Client Dashboard via AniList Graph.</p>
    </footer>

    <script>
        let currentAnimeId = 172463; 
        let currentEpisode = 1;
        let currentFormat = 'sub';
        let totalEpisodes = 12;

        const aniListQuery = `
        query ($id: Int, $search: String, $sort: [MediaSort], $genre: String) {
            Page(page: 1, perPage: 12) {
                media(id: $id, search: $search, type: ANIME, sort: $sort, genre: $genre) {
                    id
                    title { english romaji }
                    description
                    coverImage { large }
                    bannerImage
                    averageScore
                    episodes
                    genres
                    studios(isMain: true) { nodes { name } }
                }
            }
        }`;

        document.addEventListener('DOMContentLoaded', () => {
            lucide.createIcons();
            loadHomepageData();
            setupEventListeners();
        });

        // Setup DOM Event Listeners cleanly without breaking on string errors
        function setupEventListeners() {
            document.getElementById('nav-logo').addEventListener('click', showHomepage);
            document.getElementById('nav-home').addEventListener('click', showHomepage);
            document.getElementById('back-btn').addEventListener('click', showHomepage);
            
            document.getElementById('btn-sub').addEventListener('click', () => setFormat('sub'));
            document.getElementById('btn-dub').addEventListener('click', () => setFormat('dub'));
            
            document.getElementById('ctrl-play').addEventListener('click', () => controlPlayer('play'));
            document.getElementById('ctrl-seek').addEventListener('click', () => controlPlayer('seek', 120));

            // Genre buttons mapping
            document.querySelectorAll('.genre-filter').forEach(btn => {
                btn.addEventListener('click', (e) => {
                    const genre = e.target.getAttribute('data-genre');
                    filterByGenre(genre);
                });
            });

            // Search Bar Input listener
            const bar = document.getElementById('search-input');
            let bounceTimer;
            bar.addEventListener('input', (e) => {
                clearTimeout(bounceTimer);
                const query = e.target.value.trim();
                bounceTimer = setTimeout(async () => {
                    if(query.length > 2) {
                        showHomepage();
                        document.getElementById('main-grid-title').innerHTML = `<i data-lucide="search" class="w-5 h-5 text-indigo-400"></i> Search Results for: "${query}"`;
                        document.getElementById('favorites-section').classList.add('hidden');
                        lucide.createIcons();
                        const found = await fetchAniList({ search: query });
                        renderGrid('trending-grid', found);
                    } else if (query.length === 0) {
                        document.getElementById('main-grid-title').innerHTML = `<i data-lucide="trending-up" class="w-5 h-5 text-indigo-400"></i> Trending Videos Now`;
                        document.getElementById('favorites-section').classList.remove('hidden');
                        lucide.createIcons();
                        loadHomepageData();
                    }
                }, 400);
            });

            // PostMessage Listener
            window.addEventListener('message', (event) => {
                if (event.data && event.data.type === 'PLAYER_EVENT') {
                    const metadata = event.data.data;
                    const runningStatus = metadata.paused ? 'Paused' : 'Playing';
                    const statusSpan = document.getElementById('meta-status');
                    statusSpan.innerText = runningStatus;
                    statusSpan.className = metadata.paused ? 'text-amber-400 font-bold' : 'text-emerald-400 font-bold';

                    document.getElementById('meta-time').innerText = convertClockFormat(metadata.currentTime);
                    document.getElementById('meta-duration').innerText = convertClockFormat(metadata.duration);
                }
            });
        }

        async function fetchAniList(variables) {
            try {
                const response = await fetch('https://graphql.anilist.co', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json', 'Accept': 'application/json' },
                    body: JSON.stringify({ query: aniListQuery, variables })
                });
                const json = await response.json();
                return json?.data?.Page?.media || [];
            } catch (err) {
                console.error("GraphQL Error: ", err);
                return [];
            }
        }

        async function loadHomepageData() {
            const trendings = await fetchAniList({ sort: ["TRENDING_DESC"] });
            if (trendings.length > 0) {
                const hero = trendings[0];
                document.getElementById('hero-title').innerText = hero.title.english || hero.title.romaji;
                document.getElementById('hero-desc').innerHTML = hero.description || "Explore this premier anime title selection now.";
                document.getElementById('hero-bg').style.backgroundImage = `url('${hero.bannerImage || hero.coverImage.large}')`;
                
                // Safe non-inline event injection
                document.getElementById('hero-play-btn').onclick = () => launchWatchMode(hero.id);
                
                renderGrid('trending-grid', trendings);
            }
            
            const favorites = await fetchAniList({ sort: ["SCORE_DESC"] });
            renderGrid('favorites-grid', favorites);
        }

        function renderGrid(targetElementId, items) {
            const container = document.getElementById(targetElementId);
            container.innerHTML = '';
            
            items.forEach(anime => {
                const displayTitle = anime.title.english || anime.title.romaji;
                
                const card = document.createElement('div');
                card.className = "group relative bg-gray-900/40 border border-gray-800 hover:border-indigo-500/50 rounded-xl p-2.5 cursor-pointer transition-all duration-300 transform hover:-translate-y-1";
                
                // Event attached dynamically to completely prevent parser crashes 
                card.addEventListener('click', () => launchWatchMode(anime.id));
                
                card.innerHTML = `
                    <div class="relative aspect-[3/4] rounded-lg overflow-hidden mb-2 bg-gray-950">
                        <img src="${anime.coverImage.large}" class="w-full h-full object-cover transition-transform duration-500 group-hover:scale-105" loading="lazy">
                        <span class="absolute top-1.5 right-1.5 text-[10px] font-bold bg-black/70 backdrop-blur-md text-yellow-500 px-1.5 py-0.5 rounded-md border border-white/10">★ ${anime.averageScore || 'N/A'}</span>
                    </div>
                    <h4 class="text-xs font-semibold truncate text-gray-200 group-hover:text-indigo-400 transition-colors">${displayTitle}</h4>
                    <p class="text-[11px] text-gray-500 mt-0.5">${anime.episodes || '?'} Episodes</p>
                `;
                container.appendChild(card);
            });
        }

        async function launchWatchMode(id) {
            currentAnimeId = id;
            currentEpisode = 1;
            
            document.getElementById('homepage-view').classList.add('hidden');
            document.getElementById('watch-view').classList.remove('hidden');
            window.scrollTo({ top: 0, behavior: 'smooth' });

            document.getElementById('anime-title').innerText = "Loading Metadata...";
            document.getElementById('anime-description').innerText = "";

            const data = await fetchAniList({ id: parseInt(id) });
            if(!data || data.length === 0) return;

            const selected = data[0];
            totalEpisodes = selected.episodes || 12;

            document.getElementById('anime-title').innerText = selected.title.english || selected.title.romaji;
            document.getElementById('anime-description').innerHTML = selected.description || "No summary file recorded.";
            document.getElementById('anime-rating').innerText = `⭐ ${selected.averageScore || 'N/A'}%`;
            document.getElementById('anime-studio').innerText = selected.studios.nodes[0]?.name || 'Independent Production';

            const genresBox = document.getElementById('anime-genres');
            genresBox.innerHTML = '';
            selected.genres.slice(0, 3).forEach(g => {
                genresBox.innerHTML += `<span class="text-[10px] bg-indigo-500/10 text-indigo-400 border border-indigo-500/20 px-2 py-0.5 rounded-md font-medium">${g}</span>`;
            });

            setFormat('sub'); 
        }

        function showHomepage() {
            document.getElementById('watch-view').classList.add('hidden');
            document.getElementById('homepage-view').classList.remove('hidden');
            document.getElementById('embed-player').src = ""; 
        }

        async function filterByGenre(genreName) {
            showHomepage();
            document.getElementById('main-grid-title').innerHTML = `<i data-lucide="filter" class="w-5 h-5 text-indigo-400"></i> ${genreName} Genre Collection`;
            document.getElementById('favorites-section').classList.add('hidden');
            lucide.createIcons();
            const responses = await fetchAniList({ genre: genreName, sort: ["POPULARITY_DESC"] });
            renderGrid('trending-grid', responses);
        }

        function buildEpisodeGrid() {
            const listGrid = document.getElementById('episode-list');
            document.getElementById('episode-count').innerText = `${totalEpisodes} Episodes`;
            listGrid.innerHTML = '';

            for (let i = 1; i <= totalEpisodes; i++) {
                const isActive = (i === currentEpisode);
                const button = document.createElement('button');
                button.innerText = i;
                button.className = isActive 
                    ? "py-2 bg-indigo-600 text-white font-bold rounded-xl text-xs border border-indigo-500 shadow-md shadow-indigo-600/10"
                    : "py-2 bg-gray-800/60 border border-gray-700/60 hover:border-gray-600 text-gray-400 hover:text-white rounded-xl text-xs transition-all";
                
                button.addEventListener('click', () => changeEpisode(i));
                listGrid.appendChild(button);
            }
        }

        function changeEpisode(number) {
            currentEpisode = number;
            updatePlayerIframe();
        }

        function setFormat(mode) {
            currentFormat = mode;
            const subBtn = document.getElementById('btn-sub');
            const dubBtn = document.getElementById('btn-dub');

            if(mode === 'sub') {
                subBtn.className = "py-2.5 rounded-xl text-sm font-bold bg-indigo-600 text-white border border-indigo-500 shadow-md";
                dubBtn.className = "py-2.5 rounded-xl text-sm font-semibold bg-gray-800 text-gray-400 border border-gray-700/50 hover:text-white";
            } else {
                dubBtn.className = "py-2.5 rounded-xl text-sm font-bold bg-indigo-600 text-white border border-indigo-500 shadow-md";
                subBtn.className = "py-2.5 rounded-xl text-sm font-semibold bg-gray-800 text-gray-400 border border-gray-700/50 hover:text-white";
            }
            updatePlayerIframe();
        }

        function updatePlayerIframe() {
            buildEpisodeGrid();
            document.getElementById('meta-status').innerText = "Loading Frame...";
            const videoUrl = `https://tryembed.us.cc/embed/anime/${currentAnimeId}/${currentEpisode}/${currentFormat}?autoplay=true&autoSkip=true&autoNext=false`;
            document.getElementById('embed-player').src = videoUrl;
        }

        function controlPlayer(action, value = null) {
            const iframe = document.getElementById('embed-player');
            if (!iframe || !iframe.contentWindow) return;

            const packet = { command: action };
            if (value !== null) {
                if (action === 'seek') packet.time = value;
                if (action === 'volume') packet.level = value;
            }
            iframe.contentWindow.postMessage(packet, '*');
        }

        function convertClockFormat(totalSeconds) {
            if (!totalSeconds || isNaN(totalSeconds)) return '00:00';
            const m = Math.floor(totalSeconds / 60).toString().padStart(2, '0');
            const s = Math.floor(totalSeconds % 60).toString().padStart(2, '0');
            return `${m}:${s}`;
        }
    </script>
</body>
</html>
